<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
  />
  <title>One Switch Hell</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#111111" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="One Switch Hell" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      touch-action: manipulation;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #app {
      position: relative;
      width: min(100vw, 480px);
      height: min(100vh, 860px);
      background:
        linear-gradient(180deg, #181818 0%, #0f0f0f 100%);
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background:
        linear-gradient(180deg, #1b1b1b 0%, #101010 100%);
    }

    .hud {
      position: absolute;
      top: env(safe-area-inset-top, 0px);
      left: 0;
      width: 100%;
      padding: 14px 16px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
      z-index: 5;
    }

    .hud-box {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.9;
    }

    .center-message {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      z-index: 6;
      pointer-events: none;
    }

    .title {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: 0.08em;
      margin: 0 0 12px;
    }

    .subtitle {
      font-size: 14px;
      opacity: 0.72;
      line-height: 1.7;
      margin: 0;
    }

    .tap-hint {
      position: absolute;
      bottom: calc(20px + env(safe-area-inset-bottom, 0px));
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.72;
      z-index: 6;
      pointer-events: none;
    }

    .flash {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      pointer-events: none;
      z-index: 7;
      transition: background 0.08s linear;
    }

    .flash.show {
      background: rgba(255,255,255,0.14);
    }

    .death-overlay {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 25%, rgba(0,0,0,0.0) 50%),
        rgba(255, 255, 255, 0);
      opacity: 0;
      pointer-events: none;
      z-index: 8;
    }

    .death-overlay.show {
      animation: deathPulse 0.28s ease-out forwards;
    }

    @keyframes deathPulse {
      0% {
        opacity: 0;
        transform: scale(0.98);
        filter: blur(0px);
      }
      35% {
        opacity: 1;
        transform: scale(1.01);
        filter: blur(1px);
      }
      100% {
        opacity: 0;
        transform: scale(1.03);
        filter: blur(0px);
      }
    }

    .shake {
      animation: shake 0.18s linear;
    }

    @keyframes shake {
      0% { transform: translate(0px, 0px); }
      20% { transform: translate(-3px, 0px); }
      40% { transform: translate(3px, 0px); }
      60% { transform: translate(-2px, 0px); }
      80% { transform: translate(2px, 0px); }
      100% { transform: translate(0px, 0px); }
    }

    .fade-dark {
      animation: fadeDark 0.24s ease-out;
    }

    @keyframes fadeDark {
      0% { filter: brightness(1); }
      40% { filter: brightness(0.78); }
      100% { filter: brightness(1); }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="game" width="480" height="860"></canvas>

    <div class="hud">
      <div class="hud-box">Score: <span id="score">0</span></div>
      <div class="hud-box">Best: <span id="best">0</span></div>
    </div>

    <div class="center-message" id="message">
      <h1 class="title">ONE SWITCH HELL</h1>
      <p class="subtitle">
        Tap to switch lanes.<br />
        That is all.
      </p>
    </div>

    <div class="tap-hint" id="tapHint">Tap to start</div>
    <div class="flash" id="flash"></div>
    <div class="death-overlay" id="deathOverlay"></div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const app = document.getElementById("app");
    const messageEl = document.getElementById("message");
    const tapHintEl = document.getElementById("tapHint");
    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const flashEl = document.getElementById("flash");
    const deathOverlayEl = document.getElementById("deathOverlay");

    const W = canvas.width;
    const H = canvas.height;

    const laneX = [W * 0.33, W * 0.67];
    const player = {
      lane: 0,
      x: laneX[0],
      y: H - 130,
      radius: 14,
      targetX: laneX[0]
    };

    let gameState = "ready";
    let score = 0;
    let best = Number(localStorage.getItem("oneSwitchHell_best") || 0);
    let speed = 5.4;
    let spawnTimer = 0;
    let spawnInterval = 46;
    let frameCount = 0;
    let hazards = [];
    let particles = [];
    let failWait = 0;

    bestEl.textContent = best;

    function resetGame() {
      score = 0;
      speed = 5.4;
      spawnTimer = 0;
      spawnInterval = 46;
      frameCount = 0;
      hazards = [];
      particles = [];
      failWait = 0;

      player.lane = 0;
      player.x = laneX[0];
      player.targetX = laneX[0];

      scoreEl.textContent = score;
    }

    function startGame() {
      resetGame();
      gameState = "playing";
      messageEl.style.display = "none";
      tapHintEl.style.display = "none";
    }

    function softRestart() {
      resetGame();
      gameState = "playing";
      messageEl.style.display = "none";
      tapHintEl.style.display = "none";
      app.classList.remove("shake", "fade-dark");
    }

    function triggerFlash() {
      flashEl.classList.add("show");
      setTimeout(() => flashEl.classList.remove("show"), 70);
    }

    function triggerDeathEffect() {
      app.classList.remove("shake", "fade-dark");
      void app.offsetWidth;
      app.classList.add("shake", "fade-dark");

      deathOverlayEl.classList.remove("show");
      void deathOverlayEl.offsetWidth;
      deathOverlayEl.classList.add("show");

      triggerFlash();

      createDeathParticles(player.x, player.y);
    }

    function gameOver() {
      if (gameState !== "playing") return;

      gameState = "dying";
      failWait = 28;
      triggerDeathEffect();

      if (score > best) {
        best = score;
        localStorage.setItem("oneSwitchHell_best", String(best));
        bestEl.textContent = best;
      }
    }

    function switchLane() {
      if (gameState === "ready") {
        startGame();
        return;
      }

      if (gameState === "playing") {
        player.lane = player.lane === 0 ? 1 : 0;
        player.targetX = laneX[player.lane];
      }
    }

    function handleInput(e) {
      e.preventDefault();
      switchLane();
    }

    window.addEventListener("pointerdown", handleInput, { passive: false });
    window.addEventListener("touchstart", handleInput, { passive: false });
    window.addEventListener("keydown", (e) => {
      if (e.code === "Space" || e.code === "Enter") {
        e.preventDefault();
        switchLane();
      }
    });

    function createHazard() {
      const lane = Math.random() < 0.5 ? 0 : 1;

      const typeRoll = Math.random();
      let size = 20;
      let h = 70;

      if (typeRoll < 0.18) {
        size = 28;
        h = 110;
      } else if (typeRoll < 0.38) {
        size = 16;
        h = 54;
      }

      hazards.push({
        lane,
        x: laneX[lane],
        y: -h,
        w: size * 2,
        h,
        passed: false
      });
    }

    function createDeathParticles(x, y) {
      for (let i = 0; i < 16; i++) {
        const angle = (Math.PI * 2 * i) / 16 + Math.random() * 0.4;
        const power = 2 + Math.random() * 4;
        particles.push({
          x,
          y,
          vx: Math.cos(angle) * power,
          vy: Math.sin(angle) * power,
          life: 20 + Math.random() * 10,
          maxLife: 30
        });
      }
    }

    function updatePlayer() {
      player.x += (player.targetX - player.x) * 0.28;
    }

    function updateHazards() {
      spawnTimer++;
      if (spawnTimer >= spawnInterval) {
        spawnTimer = 0;
        createHazard();
      }

      for (let i = hazards.length - 1; i >= 0; i--) {
        const hz = hazards[i];
        hz.y += speed;

        if (!hz.passed && hz.y > player.y + player.radius) {
          hz.passed = true;
          score++;
          scoreEl.textContent = score;

          if (score % 5 === 0) {
            speed += 0.35;
            spawnInterval = Math.max(28, spawnInterval - 1);
          }
        }

        const playerLeft = player.x - player.radius;
        const playerRight = player.x + player.radius;
        const playerTop = player.y - player.radius;
        const playerBottom = player.y + player.radius;

        const hzLeft = hz.x - hz.w / 2;
        const hzRight = hz.x + hz.w / 2;
        const hzTop = hz.y;
        const hzBottom = hz.y + hz.h;

        const collision =
          playerRight > hzLeft &&
          playerLeft < hzRight &&
          playerBottom > hzTop &&
          playerTop < hzBottom;

        if (collision) {
          gameOver();
        }

        if (hz.y > H + hz.h + 20) {
          hazards.splice(i, 1);
        }
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.97;
        p.vy *= 0.97;
        p.life--;

        if (p.life <= 0) {
          particles.splice(i, 1);
        }
      }
    }

    function updateDying() {
      updateParticles();
      failWait--;
      if (failWait <= 0) {
        softRestart();
      }
    }

    function drawBackground() {
      ctx.clearRect(0, 0, W, H);

      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, "#1b1b1b");
      grad.addColorStop(1, "#101010");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      ctx.strokeStyle = "rgba(255,255,255,0.07)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(W / 2, 0);
      ctx.lineTo(W / 2, H);
      ctx.stroke();

      for (let i = 0; i < 12; i++) {
        const y = (frameCount * speed * 0.8 + i * 88) % (H + 88) - 88;
        ctx.strokeStyle = "rgba(255,255,255,0.05)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(W / 2, y);
        ctx.lineTo(W / 2, y + 38);
        ctx.stroke();
      }
    }

    function drawPlayer() {
      ctx.beginPath();
      ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
      ctx.fillStyle = "#ffffff";
      ctx.fill();

      ctx.beginPath();
      ctx.arc(player.x, player.y, player.radius + 6, 0, Math.PI * 2);
      ctx.strokeStyle = "rgba(255,255,255,0.12)";
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    function drawHazards() {
      hazards.forEach((hz) => {
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(hz.x - hz.w / 2, hz.y, hz.w, hz.h);

        ctx.fillStyle = "rgba(255,255,255,0.12)";
        ctx.fillRect(hz.x - hz.w / 2 - 6, hz.y + 6, hz.w + 12, 6);
      });
    }

    function drawParticles() {
      particles.forEach((p) => {
        const alpha = Math.max(0, p.life / p.maxLife);
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 2.2, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function render() {
      drawBackground();
      drawHazards();
      drawParticles();
      drawPlayer();
    }

    function loop() {
      frameCount++;

      if (gameState === "playing") {
        updatePlayer();
        updateHazards();
        updateParticles();
      } else if (gameState === "dying") {
        updatePlayer();
        updateDying();
      }

      render();
      requestAnimationFrame(loop);
    }

    render();
    loop();

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch((err) => {
          console.error("Service Worker registration failed:", err);
        });
      });
    }
  </script>
</body>
</html>
